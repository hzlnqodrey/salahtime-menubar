name: SalahTime
options:
  bundleIdPrefix: com.salahtime
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Adhan:
    url: https://github.com/batoulapps/adhan-swift
    majorVersion: 1.0.0

targets:
  SalahTime:
    type: application
    platform: macOS
    sources:
      - path: SalahTime
        excludes:
          - "Resources/README.md"
    dependencies:
      - package: Adhan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salahtime.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Salah Time needs your location to calculate accurate prayer times for your area."
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual

  SalahTimeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SalahTimeTests
    dependencies:
      - target: SalahTime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salahtime.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SalahTime.app/Contents/MacOS/SalahTime"
        BUNDLE_LOADER: "$(TEST_HOST)"
